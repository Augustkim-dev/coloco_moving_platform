<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="108" rx="78" ry="4" fill="#E5E7EB" />
  <!-- Open cargo bed floor -->
  <rect x="10" y="55" width="110" height="30" rx="2" fill="#F3F4F6" stroke="#4B5563" stroke-width="2" />
  <!-- Cargo bed side rail (rear) -->
  <rect x="10" y="42" width="4" height="16" rx="1" fill="#D1D5DB" stroke="#6B7280" stroke-width="1" />
  <!-- Cargo bed side rail (front) -->
  <rect x="116" y="42" width="4" height="16" rx="1" fill="#D1D5DB" stroke="#6B7280" stroke-width="1" />
  <!-- Cargo bed top rail -->
  <line x1="10" y1="43" x2="120" y2="43" stroke="#9CA3AF" stroke-width="2" />
  <!-- Cabin body -->
  <rect x="120" y="40" width="56" height="45" rx="4" fill="#F9FAFB" stroke="#4B5563" stroke-width="2" />
  <!-- Windshield -->
  <path d="M128 46 L128 66 L168 66 L168 46 Q148 42 128 46Z" fill="#DBEAFE" stroke="#6B7280" stroke-width="1.5" />
  <!-- Door handle -->
  <rect x="152" y="73" width="10" height="2.5" rx="1.2" fill="#9CA3AF" />
  <!-- Headlight -->
  <rect x="174" y="64" width="4" height="6" rx="1" fill="#FDE68A" stroke="#D1D5DB" stroke-width="0.5" />
  <!-- Front bumper -->
  <rect x="120" y="83" width="58" height="4" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
  <!-- Rear bumper -->
  <rect x="6" y="83" width="18" height="4" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
  <!-- Front wheel -->
  <circle cx="154" cy="92" r="12" fill="#374151" stroke="#1F2937" stroke-width="1.5" />
  <circle cx="154" cy="92" r="6" fill="#6B7280" />
  <circle cx="154" cy="92" r="2.5" fill="#9CA3AF" />
  <!-- Rear wheel -->
  <circle cx="36" cy="92" r="12" fill="#374151" stroke="#1F2937" stroke-width="1.5" />
  <circle cx="36" cy="92" r="6" fill="#6B7280" />
  <circle cx="36" cy="92" r="2.5" fill="#9CA3AF" />
  <!-- Side mirror -->
  <rect x="175" y="50" width="7" height="4" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
</svg>
