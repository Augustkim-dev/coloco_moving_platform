<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 130" fill="none">
  <!-- Shadow -->
  <ellipse cx="120" cy="118" rx="95" ry="5" fill="#E5E7EB" />
  <!-- Cargo box body -->
  <rect x="8" y="25" width="148" height="70" rx="3" fill="#F9FAFB" stroke="#4B5563" stroke-width="2" />
  <!-- Cargo box top highlight -->
  <rect x="8" y="25" width="148" height="6" rx="3" fill="#E5E7EB" />
  <!-- Cargo box door lines -->
  <line x1="58" y1="31" x2="58" y2="92" stroke="#D1D5DB" stroke-width="1" />
  <line x1="108" y1="31" x2="108" y2="92" stroke="#D1D5DB" stroke-width="1" />
  <!-- Cargo box latch -->
  <rect x="152" y="55" width="5" height="12" rx="1" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="0.5" />
  <!-- Cabin body -->
  <rect x="156" y="35" width="68" height="60" rx="5" fill="#F3F4F6" stroke="#4B5563" stroke-width="2" />
  <!-- Windshield -->
  <path d="M166 42 L166 68 L216 68 L216 42 Q190 37 166 42Z" fill="#DBEAFE" stroke="#6B7280" stroke-width="1.5" />
  <!-- Windshield divider -->
  <line x1="191" y1="41" x2="191" y2="68" stroke="#93C5FD" stroke-width="1" />
  <!-- Door handle -->
  <rect x="200" y="78" width="12" height="3" rx="1.5" fill="#9CA3AF" />
  <!-- Headlight -->
  <rect x="222" y="65" width="5" height="8" rx="1.5" fill="#FDE68A" stroke="#D1D5DB" stroke-width="0.5" />
  <!-- Tail light -->
  <rect x="3" y="70" width="4" height="8" rx="1" fill="#FCA5A5" stroke="#F87171" stroke-width="0.5" />
  <!-- Front bumper -->
  <rect x="156" y="93" width="70" height="5" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
  <!-- Rear bumper -->
  <rect x="4" y="93" width="22" height="5" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
  <!-- Front wheel -->
  <circle cx="196" cy="104" r="14" fill="#374151" stroke="#1F2937" stroke-width="1.5" />
  <circle cx="196" cy="104" r="7" fill="#6B7280" />
  <circle cx="196" cy="104" r="3" fill="#9CA3AF" />
  <!-- Rear dual wheel (inner) -->
  <circle cx="42" cy="104" r="14" fill="#374151" stroke="#1F2937" stroke-width="1.5" />
  <circle cx="42" cy="104" r="7" fill="#6B7280" />
  <circle cx="42" cy="104" r="3" fill="#9CA3AF" />
  <!-- Side mirror -->
  <rect x="224" y="48" width="8" height="5" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
  <!-- Mud flap -->
  <rect x="26" y="95" width="3" height="8" rx="0.5" fill="#6B7280" />
</svg>
