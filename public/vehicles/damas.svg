<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="108" rx="78" ry="4" fill="#E5E7EB" />
  <!-- Cargo box body -->
  <rect x="12" y="34" width="100" height="56" rx="3" fill="#F9FAFB" stroke="#4B5563" stroke-width="2" />
  <!-- Cargo box door line -->
  <line x1="62" y1="37" x2="62" y2="87" stroke="#D1D5DB" stroke-width="1" />
  <!-- Cabin body -->
  <rect x="112" y="42" width="56" height="48" rx="4" fill="#F3F4F6" stroke="#4B5563" stroke-width="2" />
  <!-- Windshield -->
  <path d="M120 48 L120 70 L160 70 L160 48 Q140 44 120 48Z" fill="#DBEAFE" stroke="#6B7280" stroke-width="1.5" />
  <!-- Windshield divider -->
  <line x1="140" y1="47" x2="140" y2="70" stroke="#93C5FD" stroke-width="1" />
  <!-- Door handle -->
  <rect x="146" y="77" width="10" height="2.5" rx="1.2" fill="#9CA3AF" />
  <!-- Headlight -->
  <rect x="166" y="68" width="4" height="6" rx="1" fill="#FDE68A" stroke="#D1D5DB" stroke-width="0.5" />
  <!-- Front bumper -->
  <rect x="112" y="88" width="58" height="4" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
  <!-- Rear bumper -->
  <rect x="8" y="88" width="18" height="4" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
  <!-- Front wheel -->
  <circle cx="148" cy="96" r="12" fill="#374151" stroke="#1F2937" stroke-width="1.5" />
  <circle cx="148" cy="96" r="6" fill="#6B7280" />
  <circle cx="148" cy="96" r="2.5" fill="#9CA3AF" />
  <!-- Rear wheel -->
  <circle cx="38" cy="96" r="12" fill="#374151" stroke="#1F2937" stroke-width="1.5" />
  <circle cx="38" cy="96" r="6" fill="#6B7280" />
  <circle cx="38" cy="96" r="2.5" fill="#9CA3AF" />
  <!-- Side mirror -->
  <rect x="167" y="52" width="7" height="4" rx="2" fill="#E5E7EB" stroke="#6B7280" stroke-width="1" />
</svg>
